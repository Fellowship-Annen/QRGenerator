<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>QRコード作成フォーム</title>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
    }

    .instructions {
      color: #444;
      margin-bottom: 15px;
    }

    #inputs {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px 40px;
      max-width: 800px;
      margin: auto;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      width: 220px;
      align-items: flex-start;
    }

    .input-group input {
      width: 100%;
      padding: 6px;
      font-size: 16px;
    }

    #buttons {
      margin: 15px;
    }

    /* 印刷時に非表示 */
@media print {
  .no-print,
  #printBtn {
    display: none !important;
  }
}

    #qr-container {
      display: grid;
      grid-template-columns: repeat(2, auto);
      gap: 20px 60px;
      justify-content: center;
      margin: 20px auto;
      width: fit-content;
      page-break-inside: avoid;
    }

    .qr-box {
      border: 1px solid #000;
      padding: 2mm; /* ← 外枠との余白2mm */
      width: 34mm;
      box-sizing: border-box;
    }

    .qr-box.large {
      width: 54mm;
    }

    .qr-box img {
      display: block;
      margin: 0 auto;
      width: 30mm;
      height: 30mm;
    }

    .qr-box.large img {
      width: 50mm;
      height: 50mm;
    }

    .qr-text {
      font-size: 10pt;
      margin-top: 3mm;
      white-space: nowrap;
    }

    .qr-name {
      font-size: 9pt;
      margin-top: 1mm;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="no-print">
    <h1>QRコード作成フォーム</h1>
    <div class="instructions">
      最初に事業所のイニシャルをつけて、入荷年月日、連番2桁(入庫数)を入力する。<br>
      例：S25072901 → さんらいず、2025年7月29日、入庫1つ目
    </div>

    <div id="inputs"></div>

    <div id="buttons">
      <button onclick="generateQRCodes()">QRコードを生成</button>
      <button id="printBtn" onclick="window.print()" style="display:none;">印刷</button>
      <button id="toggleSizeBtn" onclick="toggleQRCodeSize()" style="display:none;">拡大</button>
    </div>
  </div>

  <div id="qr-container"></div>

  <script>
    const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSfsnmtwi-h-wtKXtl4_LNaeH85BMDYT4OtVmJCaaxndELKZFw/viewform?usp=pp_url&entry.268306040=';
    let isLargeQRCode = false;

    const inputsDiv = document.getElementById('inputs');
    for (let i = 1; i <= 10; i++) {
      const group = document.createElement('div');
      group.className = 'input-group';

      const idInput = document.createElement('input');
      idInput.type = 'text';
      idInput.placeholder = `例：S250729${i.toString().padStart(2, '0')}`;
      idInput.className = 'id-input';

      const nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.placeholder = '任意テキスト（名前など）';
      nameInput.className = 'name-input';

      group.appendChild(idInput);
      group.appendChild(nameInput);
      inputsDiv.appendChild(group);
    }

    function isValidID(str) {
      return /^[A-Z]{1}\d{6}\d{2}$/.test(str);
    }

    function generateQRCodes() {
      const container = document.getElementById('qr-container');
      container.innerHTML = '';

      const idInputs = document.querySelectorAll('.id-input');
      const nameInputs = document.querySelectorAll('.name-input');
      let hasError = false;

      idInputs.forEach((input, idx) => {
        const val = input.value.trim();
        if (val && !isValidID(val)) {
          alert(`入力 ${idx + 1} の管理番号「${val}」は形式が正しくありません。\\n形式: A+YYMMDD+連番2桁 例：S25072901`);
          hasError = true;
        }
      });

      if (hasError) return;

      idInputs.forEach((idInput, i) => {
        const id = idInput.value.trim();
        const name = nameInputs[i].value.trim();

        if (id) {
          const qr = new QRious({
            value: FORM_URL + encodeURIComponent(id),
            size: 285
          });

          const box = document.createElement('div');
          box.className = 'qr-box';
          if (isLargeQRCode) {
            box.classList.add('large');
          }

          const img = document.createElement('img');
          img.src = qr.toDataURL();
          box.appendChild(img);

          const idText = document.createElement('div');
          idText.className = 'qr-text';
          idText.textContent = id;
          box.appendChild(idText);

          if (name) {
            const nameText = document.createElement('div');
            nameText.className = 'qr-name';
            nameText.textContent = name;
            box.appendChild(nameText);
          }

          container.appendChild(box);
        }
      });

// QRコードが1つでも生成されたら印刷ボタンと拡縮ボタンを表示
const qrBoxes = document.querySelectorAll('.qr-box');
const printBtn = document.getElementById('printBtn');
const toggleSizeBtn = document.getElementById('toggleSizeBtn');

if (qrBoxes.length > 0) {
  printBtn.style.display = 'inline-block';
  printBtn.classList.add('no-print');  // ←これで印刷時には消える

  toggleSizeBtn.style.display = 'inline-block';
  toggleSizeBtn.classList.add('no-print');
  toggleSizeBtn.textContent = isLargeQRCode ? '縮小' : '拡大';
} else {
  printBtn.style.display = 'none';
  toggleSizeBtn.style.display = 'none';
}

    }

    function toggleQRCodeSize() {
      const qrBoxes = document.querySelectorAll('.qr-box');
      if (qrBoxes.length === 0) return;

      isLargeQRCode = !isLargeQRCode;
      qrBoxes.forEach(box => box.classList.toggle('large', isLargeQRCode));

      const toggleSizeBtn = document.getElementById('toggleSizeBtn');
      toggleSizeBtn.textContent = isLargeQRCode ? '縮小' : '拡大';
    }
  </script>
</body>
</html>
