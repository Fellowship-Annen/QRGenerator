<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>QRコード作成フォーム</title>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
    }

    .instructions {
      color: #444;
      margin-bottom: 15px;
    }

    #inputs {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px 40px;
      max-width: 800px;
      margin: auto;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      width: 220px;
      align-items: flex-start;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 6px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .mode-select {
      margin-bottom: 6px;
    }

    .normal-id-fields {
      display: grid;
      grid-template-columns: 64px 1fr 64px;
      gap: 6px;
      width: 100%;
      margin-bottom: 6px;
    }

    .custom-id-input {
      margin-bottom: 6px;
    }

    .name-input {
      margin-top: 2px;
    }

    .hidden {
      display: none !important;
    }

    #buttons {
      margin: 15px;
    }

    .data-status {
      margin-top: 8px;
      color: #444;
      font-size: 12px;
    }

    .data-status.error {
      color: #b00020;
    }

    /* 印刷時に非表示 */
@media print {
  .no-print,
  #printBtn {
    display: none !important;
  }
}

    #qr-container {
      display: grid;
      grid-template-columns: repeat(2, auto);
      gap: 20px 60px;
      justify-content: center;
      margin: 20px auto;
      width: fit-content;
      page-break-inside: avoid;
    }

    .qr-box {
      border: 1px solid #000;
      padding: 2mm; /* ← 外枠との余白2mm */
      width: 34mm;
      box-sizing: border-box;
    }

    .qr-box.large {
      width: 54mm;
    }

    .qr-box img {
      display: block;
      margin: 0 auto;
      width: 30mm;
      height: 30mm;
    }

    .qr-box.large img {
      width: 50mm;
      height: 50mm;
    }

    .qr-text {
      font-size: 10pt;
      margin-top: 3mm;
      white-space: nowrap;
    }

    .qr-name {
      font-size: 9pt;
      margin-top: 1mm;
      color: #000;
    }

    .qr-link-button {
      margin-top: 3mm;
      padding: 4px 8px;
      font-size: 10pt;
      cursor: pointer;
    }

    .registered-label {
      margin-top: 2mm;
      color: #d00000;
      font-size: 10pt;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="no-print">
    <h1>QRコード作成フォーム</h1>
    <div class="instructions">
      最初に事業所のイニシャルをつけて、入荷年月日、連番2桁(入庫数)を入力する。<br>
      例：S25072901 → さんらいず、2025年7月29日、入庫1つ目
    </div>

    <div id="inputs"></div>

    <div id="buttons">
      <button onclick="generateQRCodes()">QRコードを生成</button>
      <button id="updateDataBtn" type="button" onclick="updateRegisteredIds()">データ更新</button>
      <button id="printBtn" onclick="window.print()" style="display:none;">印刷</button>
      <button id="toggleSizeBtn" onclick="toggleQRCodeSize()" style="display:none;">拡大</button>
      <div id="dataStatus" class="data-status">データ未取得</div>
    </div>
  </div>

  <div id="qr-container"></div>

  <script>
    const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSfsnmtwi-h-wtKXtl4_LNaeH85BMDYT4OtVmJCaaxndELKZFw/viewform?usp=pp_url&entry.268306040=';
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/15UGqdqOwVQNx9qY02HtZIaqrD6Kd1dwmWuj4p3EGIGg/export?format=csv&gid=93776902';
    let isLargeQRCode = false;
    let registeredIds = [];
    let registeredIdSet = new Set();

    const OFFICE_PREFIXES = [
      { value: 'S', label: 'S：さんらいず' },
      { value: 'O', label: 'O：オーシャン' },
      { value: 'F', label: 'F：フォージー' }
    ];

    function getTodayYYMMDD() {
      const today = new Date();
      const yy = String(today.getFullYear()).slice(-2);
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      return `${yy}${mm}${dd}`;
    }

    function expandOfficePrefixSelect(select) {
      [...select.options].forEach(option => {
        option.textContent = option.dataset.label;
      });
    }

    function collapseOfficePrefixSelect(select) {
      [...select.options].forEach(option => {
        option.textContent = option.selected ? option.value : option.dataset.label;
      });
    }

    function createOfficePrefixSelect() {
      const select = document.createElement('select');
      select.className = 'prefix-select';
      OFFICE_PREFIXES.forEach(({ value, label }) => {
        const option = document.createElement('option');
        option.value = value;
        option.dataset.label = label;
        option.textContent = label;
        select.appendChild(option);
      });

      select.addEventListener('mousedown', () => expandOfficePrefixSelect(select));
      select.addEventListener('focus', () => expandOfficePrefixSelect(select));
      select.addEventListener('change', () => setTimeout(() => collapseOfficePrefixSelect(select), 0));
      select.addEventListener('blur', () => collapseOfficePrefixSelect(select));
      collapseOfficePrefixSelect(select);

      return select;
    }

    function normalizeSerial(value) {
      const digits = value.replace(/\D/g, '').slice(0, 2);
      return digits ? digits.padStart(2, '0') : '';
    }

    function updateInputMode(group) {
      const mode = group.querySelector('.mode-select').value;
      const normalFields = group.querySelector('.normal-id-fields');
      const customInput = group.querySelector('.custom-id-input');
      const isCustom = mode === 'custom';

      normalFields.classList.toggle('hidden', isCustom);
      customInput.classList.toggle('hidden', !isCustom);
    }

    function getGeneratedId(group) {
      const mode = group.querySelector('.mode-select').value;
      if (mode === 'custom') {
        return group.querySelector('.custom-id-input').value.trim();
      }

      const prefix = group.querySelector('.prefix-select').value;
      const date = group.querySelector('.date-input').value.trim();
      const serial = normalizeSerial(group.querySelector('.serial-input').value.trim());

      if (!serial) return '';
      return `${prefix}${date}${serial}`;
    }

    const inputsDiv = document.getElementById('inputs');
    const defaultDate = getTodayYYMMDD();
    for (let i = 1; i <= 10; i++) {
      const group = document.createElement('div');
      group.className = 'input-group';

      const modeSelect = document.createElement('select');
      modeSelect.className = 'mode-select';
      modeSelect.innerHTML = '<option value="normal">通常入力</option><option value="custom">カスタム入力</option>';

      const normalFields = document.createElement('div');
      normalFields.className = 'normal-id-fields';

      const prefixSelect = createOfficePrefixSelect();

      const dateInput = document.createElement('input');
      dateInput.type = 'text';
      dateInput.inputMode = 'numeric';
      dateInput.maxLength = 6;
      dateInput.placeholder = 'YYMMDD';
      dateInput.value = defaultDate;
      dateInput.className = 'date-input';

      const serialInput = document.createElement('input');
      serialInput.type = 'text';
      serialInput.inputMode = 'numeric';
      serialInput.maxLength = 2;
      serialInput.placeholder = i.toString().padStart(2, '0');
      serialInput.className = 'serial-input';
      serialInput.addEventListener('blur', () => {
        serialInput.value = normalizeSerial(serialInput.value);
      });

      normalFields.appendChild(prefixSelect);
      normalFields.appendChild(dateInput);
      normalFields.appendChild(serialInput);

      const customIdInput = document.createElement('input');
      customIdInput.type = 'text';
      customIdInput.placeholder = `例：S${defaultDate}${i.toString().padStart(2, '0')}`;
      customIdInput.className = 'custom-id-input id-input hidden';

      const nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.placeholder = '任意テキスト（名前など）';
      nameInput.className = 'name-input';

      modeSelect.addEventListener('change', () => updateInputMode(group));

      group.appendChild(modeSelect);
      group.appendChild(normalFields);
      group.appendChild(customIdInput);
      group.appendChild(nameInput);
      inputsDiv.appendChild(group);
      updateInputMode(group);
    }

    function isValidID(str) {
      return /^[A-Z]{1}\d{6}\d{2}$/.test(str);
    }


    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            value += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(value);
          value = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && nextChar === '\n') {
            i++;
          }
          row.push(value);
          rows.push(row);
          row = [];
          value = '';
        } else {
          value += char;
        }
      }

      if (value || row.length > 0) {
        row.push(value);
        rows.push(row);
      }

      return rows;
    }

    function setDataStatus(message, isError = false) {
      const dataStatus = document.getElementById('dataStatus');
      dataStatus.textContent = message;
      dataStatus.classList.toggle('error', isError);
    }

    function getSheetFetchErrorMessage(error) {
      if (error.name === 'AbortError') {
        return 'データ取得がタイムアウトしました。通信状況を確認して、データ更新を再実行してください。';
      }

      if (error instanceof TypeError) {
        return 'データ取得に失敗しました。CORS、リダイレクト、またはネットワーク遮断の可能性があります。スプレッドシートが「リンクを知っている全員が閲覧可」になっているか確認してください。';
      }

      return error.message || 'データ取得に失敗しました。';
    }

    async function updateRegisteredIds() {
      const updateDataBtn = document.getElementById('updateDataBtn');

      updateDataBtn.disabled = true;
      setDataStatus('データ取得中...');

      try {
        console.log('[Sheet CSV] fetch start:', SHEET_CSV_URL);
        const response = await fetch(SHEET_CSV_URL, { cache: 'no-store' });

        console.log('[Sheet CSV] response.status:', response.status);
        console.log('[Sheet CSV] response.url:', response.url);
        console.log('[Sheet CSV] response.type:', response.type);

        const csvText = await response.text();
        console.log('[Sheet CSV] csvText.slice(0, 300):', csvText.slice(0, 300));

        if (!response.ok) {
          throw new Error(`スプレッドシート取得エラー: HTTP ${response.status}`);
        }

        const trimmedCsvText = csvText.trim();
        if (!trimmedCsvText) {
          throw new Error('CSVデータが空でした。');
        }

        if (trimmedCsvText.startsWith('<') || trimmedCsvText.toLowerCase().includes('<html')) {
          throw new Error('CSVではなくHTMLが返されました。ログイン画面や権限エラー画面へリダイレクトされた可能性があります。');
        }

        const rows = parseCsv(csvText);
        console.log('[Sheet CSV] parseCsv(csvText)[0]:', rows[0]);

        const fetchedIds = rows
          .map(row => (row[0] || '').trim())
          .filter(id => id && isValidID(id));
        console.log('[Sheet CSV] fetchedIds.length:', fetchedIds.length);

        registeredIds = fetchedIds;
        registeredIdSet = new Set(registeredIds);
        setDataStatus(`登録済ID: ${registeredIds.length}件取得済`);
        return true;
      } catch (error) {
        console.error('スプレッドシート取得エラー:', error);
        setDataStatus(getSheetFetchErrorMessage(error), true);
        return false;
      } finally {
        updateDataBtn.disabled = false;
      }
    }
    function generateQRCodes() {
      const container = document.getElementById('qr-container');
      container.innerHTML = '';

      const inputGroups = document.querySelectorAll('.input-group');
      let hasError = false;

      inputGroups.forEach((group, idx) => {
        const id = getGeneratedId(group);
        if (id && !isValidID(id)) {
          alert(`入力 ${idx + 1} の管理番号「${id}」は形式が正しくありません。\n形式: A+YYMMDD+連番2桁 例：S25072901`);
          hasError = true;
        }
      });

      if (hasError) return;

      inputGroups.forEach((group) => {
        const id = getGeneratedId(group);
        const name = group.querySelector('.name-input').value.trim();

        if (id) {
          const qrUrl = FORM_URL + encodeURIComponent(id);
          const qr = new QRious({
            value: qrUrl,
            size: 285
          });

          const box = document.createElement('div');
          box.className = 'qr-box';
          if (isLargeQRCode) {
            box.classList.add('large');
          }

          const img = document.createElement('img');
          img.src = qr.toDataURL();
          box.appendChild(img);

          const idText = document.createElement('div');
          idText.className = 'qr-text';
          idText.textContent = id;
          box.appendChild(idText);

          if (name) {
            const nameText = document.createElement('div');
            nameText.className = 'qr-name';
            nameText.textContent = name;
            box.appendChild(nameText);
          }

          if (registeredIdSet.has(id)) {
            const registeredLabel = document.createElement('div');
            registeredLabel.className = 'registered-label no-print';
            registeredLabel.textContent = '登録済';
            box.appendChild(registeredLabel);
          }

          const linkButton = document.createElement('button');
          linkButton.type = 'button';
          linkButton.className = 'qr-link-button no-print';
          linkButton.textContent = 'フォームを開く';
          linkButton.addEventListener('click', () => {
            window.open(qrUrl, '_blank', 'noopener,noreferrer');
          });
          box.appendChild(linkButton);

          container.appendChild(box);
        }
      });

// QRコードが1つでも生成されたら印刷ボタンと拡縮ボタンを表示
const qrBoxes = document.querySelectorAll('.qr-box');
const printBtn = document.getElementById('printBtn');
const toggleSizeBtn = document.getElementById('toggleSizeBtn');

if (qrBoxes.length > 0) {
  printBtn.style.display = 'inline-block';
  printBtn.classList.add('no-print');  // ←これで印刷時には消える

  toggleSizeBtn.style.display = 'inline-block';
  toggleSizeBtn.classList.add('no-print');
  toggleSizeBtn.textContent = isLargeQRCode ? '縮小' : '拡大';
} else {
  printBtn.style.display = 'none';
  toggleSizeBtn.style.display = 'none';
}

    }

    updateRegisteredIds();

    function toggleQRCodeSize() {
      const qrBoxes = document.querySelectorAll('.qr-box');
      if (qrBoxes.length === 0) return;

      isLargeQRCode = !isLargeQRCode;
      qrBoxes.forEach(box => box.classList.toggle('large', isLargeQRCode));

      const toggleSizeBtn = document.getElementById('toggleSizeBtn');
      toggleSizeBtn.textContent = isLargeQRCode ? '縮小' : '拡大';
    }
  </script>
</body>
</html>
